<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login Sistem BPDAS</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(120deg, #2e7d32, #81c784);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-box {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      width: 320px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
    }

    .login-box h2 {
      margin-bottom: 20px;
      color: #2e7d32;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2e7d32;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #1b5e20;
    }

    .error {
      color: red;
      font-size: 13px;
      margin-top: 10px;
    }

    .footer {
      font-size: 11px;
      margin-top: 15px;
      color: #777;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h2>Login Sistem</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Masuk</button>

    <div class="error" id="error"></div>

    <div class="footer">
      Sistem BPDAS Bone Limboto
    </div>
  </div>

<script>
function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  // LOGIN SEMENTARA (nanti bisa kita upgrade ke Google Sheet)
  const validUser = "admin";
  const validPass = "1234";

  if (user === validUser && pass === validPass) {
    localStorage.setItem("login", "true");
    window.location.href = "index.htm";
  } else {
    document.getElementById("error").innerText = "Username atau password salah!";
  }
}
</script>

</body>
</html>
